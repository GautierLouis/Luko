name: Server PR Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "api-contracts/**"
      - "server/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/server/**"
      - "Dockerfile"
      - "infra/docker-compose.yml"
jobs:
  test:
    name: Ktor Server Unit Tests
    runs-on: ubuntu-latest
    if: ${{ github.head_ref == 'develop' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      - name: Run server tests
        run: ./gradlew :server:test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results
          path: 'server/build/reports/tests/test/'
          retention-days: 7