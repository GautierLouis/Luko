name: Maestro UI Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ develop ]

jobs:
  android:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: arm64-v8a
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install -r composeApp/build/outputs/apk/dev/debug/composeApp-dev-debug.apk
            $HOME/.maestro/bin/maestro test --test-output-dir maestro-output .maestro/start_app.yml

      - name: Upload screenshots & report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: |
            screenshots/
            maestro-output/
          retention-days: 14

