name: Server — PR Checks

on:
  workflow_run:
    workflows: [ "Labeler" ]
    types: [ completed ]

  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened, labeled ]

jobs:
  test-server:
    name: Run :server tests + update Swagger
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      contains(github.event.workflow_run.pull_requests.*.labels.*.name, 'server')

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run server tests
        run: ./gradlew :server:test --no-daemon

      - name: Generate Swagger / OpenAPI doc
        run: ./gradlew :server:generateOpenApiDocs --no-daemon   # adjust task to your plugin

      - name: Commit updated Swagger to PR branch
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update swagger docs [skip ci]"
          file_pattern: "server/docs/openapi.json"   # adjust to your output path

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-results
          path: server/build/reports/tests/test/
          retention-days: 7