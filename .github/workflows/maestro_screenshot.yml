name: Maestro UI Tests

on:
  push:
    branches: [ develop ]
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    continue-on-error: false
    env:
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 5
    #    strategy:
    #      fail-fast: false
    #      matrix:
    #        include:
    #          - profile: "pixel_6"          # compact phone  ~6.4"  1080×2400
    #            label: "phone-compact"
    #          - profile: "pixel_7_pro"      # large phone    ~6.7"  1440×3120
    #            label: "phone-large"
    #          - profile: "pixel_tablet"     # tablet         ~10.9" 2560×1600
    #            label: "tablet"
    #          - profile: "Nexus 4"          # small phone    ~4.7"  768×1280
    #            label: "phone-small"
    #
    #        # All share the same API/arch — only the screen size changes
    #        api-level: "34"          # ← move this OUT of include, it's the same for all
    #        target: "google_apis"
    #        arch: x86_64

    steps:
      - uses: actions/checkout@v4

      # ✅ Must be FIRST — before the emulator is ever touched
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        continue-on-error: true
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          #          api-level: ${{ matrix.api-level }}
          #          profile: ${{ matrix.profile }}
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -accel on
          disable-animations: true
          emulator-boot-timeout: 300
          script: |
            # Install the APK
            adb install -r composeApp/build/outputs/apk/debug/composeApp-debug.apk

            # Run the flow
            maestro test \
            --test-output-dir maestro-output \
            .maestro/start_app.yml

            echo "MAESTRO_EXIT=$?" >> $GITHUB_ENV

      - name: Check Maestro result
        run: exit ${{ env.MAESTRO_EXIT }}

      - name: Upload screenshots & report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          # Your flow writes to screenshots/ relative to working dir
          # maestro-output/ contains the XML report + any failure screenshots
          path: |
            screenshots/
            maestro-output/
          retention-days: 14

  ios:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: "iPhone 15"
            os: "18.4"
          - device: "iPhone 15 Pro Max"
            os: "18.4"

    steps:
      - uses: actions/checkout@v4

      - name: List available runtimes
        run: xcrun simctl list runtimes

      - name: Start simulator
        run: |
          UDID=$(xcrun simctl create "test-${{ matrix.device }}" \
          "${{ matrix.device }}" \
          "iOS ${{ matrix.os }}")
          xcrun simctl boot $UDID
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Build iOS app
        run: |
          xcodebuild -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -destination "id=${{ env.SIMULATOR_UDID }}" \
            -configuration Debug \
            build

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro tests
        run: maestro --device ${{ env.SIMULATOR_UDID }} test .maestro/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-ios-${{ matrix.device }}-${{ matrix.os }}
          path: .maestro/screenshots/
          retention-days: 14