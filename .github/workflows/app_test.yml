name: Library Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ develop ]

jobs:
  # ─────────────────────────────────────────────
  # Android — local JVM unit tests, no device
  # ─────────────────────────────────────────────
  test-android:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    if: ${{ github.head_ref == 'develop' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run Android unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: '**/build/reports/tests/testDebugUnitTest/'
          retention-days: 7

  # ─────────────────────────────────────────────
  # iOS — macOS required for Kotlin/Native toolchain
  # ─────────────────────────────────────────────
  test-ios:
    name: iOS Unit Tests
    runs-on: macos-latest
    if: ${{ github.head_ref == 'develop' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run iOS unit tests
        # Kotlin/Native runs directly on the host — no simulator process needed
        run: ./gradlew iosSimulatorArm64Test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: '**/build/reports/tests/iosSimulatorArm64Test/'
          retention-days: 7

  # ─────────────────────────────────────────────
  # Desktop (JVM) — Linux
  # ─────────────────────────────────────────────
  test-desktop:
    name: Desktop Unit Tests
    runs-on: ubuntu-latest
    if: ${{ github.head_ref == 'develop' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Run Desktop unit tests
        run: ./gradlew desktopTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-test-results
          path: '**/build/reports/tests/desktopTest/'
          retention-days: 7

  # ─────────────────────────────────────────────
  # Gate — all three must pass
  # ─────────────────────────────────────────────
  all-tests-passed:
    name: All Library Tests Passed
    runs-on: ubuntu-latest
    needs: [ test-android, test-ios, test-desktop ]
    if: ${{ always() && github.head_ref == 'develop' }}

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.test-android.result }}" != "success" || \
                "${{ needs.test-ios.result }}"     != "success" || \
                "${{ needs.test-desktop.result }}"  != "success" ]]; then
            echo "One or more library test jobs failed."
            exit 1
          fi
          echo "All library tests passed ✅"