appId: com.louisgautier.composeApp.dev
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      label: "home_screen"
    timeout: 30000
- takeScreenshot:
    path: screenshots/Home/home_portrait.png
- setOrientation: LANDSCAPE_LEFT
- extendedWaitUntil:
    visible:
      label: "home_screen"
    timeout: 10000
- takeScreenshot:
    path: screenshots/Home/home_landscape.png