openapi: 3.0.3
info:
  title: Dictionary API
  version: 1.0.0

tags:
  - name: Auth
  - name: Characters
  - name: Session
  - name: Admin

paths:

  /register_anon:
    post:
      tags: [ Auth ]
      summary: Register an anonymous user
      responses:
        '200':
          description: Anonymous session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /me:
    get:
      tags: [ Auth ]
      summary: Get current user info
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /refresh_token:
    post:
      tags: [ Auth ]
      summary: Refresh authentication token
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: New token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /update_fcm:
    post:
      tags: [ Auth ]
      summary: Update FCM push notification token
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ token ]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: FCM token updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /level:
    get:
      tags: [ Characters ]
      summary: Get all available frequency levels
      responses:
        '200':
          description: List of levels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CharacterFrequencyLevelDto'
        '500':
          $ref: '#/components/responses/InternalError'

  /characters/by_level:
    get:
      tags: [ Characters ]
      summary: Get characters filtered by frequency level
      parameters:
        - name: level
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CharacterFrequencyLevelDto'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of characters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCharacters'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /characters/search:
    get:
      tags: [ Characters ]
      summary: Search characters by query and levels
      parameters:
        - name: levels
          in: query
          required: true
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/CharacterFrequencyLevelDto'
        - name: query
          in: query
          required: false
          schema:
            type: string
            default: ""
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCharacters'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /characters/{code}:
    get:
      tags: [ Characters ]
      summary: Get a character by its code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Character detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /characters/{code}/graphic:
    get:
      tags: [ Characters ]
      summary: Get graphic/stroke data for a character
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Graphic data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharacterGraphicResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /createSession:
    get:
      tags: [ Session ]
      summary: Generate a random session of characters
      parameters:
        - name: levels
          in: query
          required: false
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/CharacterFrequencyLevelDto'
            description: Defaults to all levels if omitted
        - name: limit
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Generated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /admin/swagger:
    get:
      tags: [ Admin ]
      summary: Swagger UI
      responses:
        '200':
          description: HTML Swagger UI page
          content:
            text/html:
              schema:
                type: string

  /admin/openapi:
    get:
      tags: [ Admin ]
      summary: Raw OpenAPI spec
      responses:
        '200':
          description: OpenAPI YAML or JSON
          content:
            application/json:
              schema:
                type: object

  /admin/metrics:
    get:
      tags: [ Admin ]
      summary: Application metrics
      responses:
        '200':
          description: Metrics data
          content:
            text/plain:
              schema:
                type: string

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 500

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResponseError'
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResponseError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResponseError'
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResponseError'

  schemas:

    CharacterFrequencyLevelDto:
      type: string
      enum:
        - LEVEL_1
        - LEVEL_2
        - LEVEL_3
        - LEVEL_4
        - LEVEL_5

    ResponseError:
      type: object
      required: [ code, message ]
      properties:
        code:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: "'levels' does not contain element with name 'FREQUENTA'"
        timestamp:
          type: integer
          format: int64

    PagedCharacters:
      type: object
      required: [ data, page, limit ]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CharacterResponse'
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
          nullable: true
        hasMore:
          type: boolean

    CharacterResponse:
      type: object
      properties:
        code:
          type: integer
        character:
          type: string
        level:
          $ref: '#/components/schemas/CharacterFrequencyLevelDto'

    CharacterGraphicResponse:
      type: object
      properties:
        code:
          type: integer
        strokes:
          type: array
          items:
            type: string

    SessionResponse:
      type: object
      properties:
        characters:
          type: array
          items:
            $ref: '#/components/schemas/CharacterResponse'

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: string
        createdAt:
          type: integer
          format: int64